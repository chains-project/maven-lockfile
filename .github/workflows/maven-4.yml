name: Maven 4 Compatibility

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Maven 4
        run: |
          wget -q https://downloads.apache.org/maven/maven-4/4.0.0-rc-5/binaries/apache-maven-4.0.0-rc-5-bin.tar.gz
          tar -xzf apache-maven-4.0.0-rc-5-bin.tar.gz -C $HOME
          echo "$HOME/apache-maven-4.0.0-rc-5/bin" >> $GITHUB_PATH

      - name: Verify Maven version
        run: mvn --version

      - name: Build with Maven 4
        run: mvn clean install -B
